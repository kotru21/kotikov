# Ensures README*.md and vercel.json match package.json (run `bun run sync-readme-versions` locally if this fails).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync README from package.json
        run: bun run sync-readme-versions

      - name: Fail if READMEs or vercel.json are out of sync
        run: git diff --exit-code README.md README.ru.md README.en.md vercel.json

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
